name: FPGA CI
on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
          python -m pip install --upgrade pip
          pip install numpy

      - name: Build RTL
        run: make build

      - name: Run RTL Simulation
        run: make run_sim

      - name: Hardware Co-Simulation
        run: python3 scripts/cosim.py --vectors 500
